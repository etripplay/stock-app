<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產業供應鏈地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── CSS Variables — mirrors index.html ───────────────── */
:root {
  --bg:      #F5F3EE;
  --card:    #FFFFFF;
  --card2:   #F9F7F2;
  --bd:      #DDD8CF;
  --text:    #1A1A18;
  --dim:     #6B6460;
  --navy:    #1A3A58;
  --navy2:   #1F4D78;
  --accent:  #D45F25;
  --accent2: #B34E1A;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
}
@media(prefers-color-scheme:dark){:root{--sys-dark:1;}}
[data-theme="dark"] {
  --bg:      #111210;
  --card:    #1C1C1A;
  --card2:   #242422;
  --bd:      #333330;
  --text:    #E8E6E0;
  --dim:     #888580;
  --navy:    #163248;
  --navy2:   #1D4060;
  --accent:  #E8713A;
  --accent2: #C85C28;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── Header ─────────────────────────────────────────── */
.hdr{
  flex-shrink:0;
  background:linear-gradient(135deg,#0D1F35 0%,#1A3A58 55%,#0F2A40 100%);
  color:#fff;padding:12px 16px;
  border-bottom:2px solid var(--accent);
  box-shadow:0 4px 24px rgba(0,0,0,.25);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.hdr-title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;}
.hdr-title span{display:inline-block;width:4px;height:20px;background:var(--accent);border-radius:2px;}
.hdr-sub{font-size:11px;color:#8eabc8;margin-top:2px;}
.back-btn{font-size:12px;color:#8eabc8;text-decoration:none;border:1px solid rgba(255,255,255,.2);padding:5px 10px;border-radius:8px;white-space:nowrap;transition:.15s;}
.back-btn:hover{color:#fff;border-color:rgba(255,255,255,.5);}

/* ── Tab bar ─────────────────────────────────────────── */
.tabs-bar{
  flex-shrink:0;background:var(--card);border-bottom:1px solid var(--bd);
  padding:0 14px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none;}
.chain-tab{
  flex-shrink:0;padding:11px 14px;font-size:13px;font-family:inherit;
  border:none;background:transparent;
  color:var(--dim);cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;
}
.chain-tab:hover{color:var(--text);}
.chain-tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}

/* ── Filter bar ─────────────────────────────────────── */
#filters{
  flex-shrink:0;display:flex;gap:5px;padding:6px 14px;
  overflow-x:auto;scrollbar-width:none;background:var(--card2);
  border-bottom:1px solid var(--bd);
}
#filters::-webkit-scrollbar{display:none;}
#filters.hidden{display:none;}
.ftab{
  flex-shrink:0;font-size:10px;padding:3px 10px;border-radius:20px;
  border:0.5px solid var(--bd);background:var(--card);color:var(--dim);
  cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;
  font-family:inherit;
}
.ftab.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.ftab.nvda-f.active{background:#3BAD8D;border-color:#3BAD8D;color:#fff;}
.ftab.amd-f.active{background:#E07030;border-color:#E07030;color:#fff;}

/* ── Load bar ────────────────────────────────────────── */
#loadbar{flex-shrink:0;height:2px;background:var(--bd);}
#loadprog{height:100%;width:0%;background:var(--accent);transition:width .25s;}

/* ── Hint bar ────────────────────────────────────────── */
#hintbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:3px 14px 2px;font-size:10px;color:var(--dim);background:var(--card2);
  border-bottom:1px solid var(--bd);
}

/* ── Canvas ─────────────────────────────────────────── */
#canvas-wrap{
  flex:1;position:relative;overflow:hidden;cursor:grab;background:var(--bg);
}
#canvas-wrap.grabbing{cursor:grabbing;}
#canvas-wrap canvas{display:block;width:100%;height:100%;background:transparent;}

/* ── Zoom controls ───────────────────────────────────── */
#zoom-ctrl{position:absolute;bottom:48px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:10;}
.zbtn{
  width:30px;height:30px;border-radius:8px;border:1px solid var(--bd);
  background:var(--card);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);color:var(--dim);transition:background .1s;font-family:inherit;
}
.zbtn:hover{background:var(--card2);}

/* ── Theme toggle ────────────────────────────────────── */
#theme-btn{
  position:absolute;bottom:14px;right:14px;z-index:10;
  width:30px;height:30px;border-radius:8px;border:1px solid var(--bd);
  background:var(--card);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);transition:background .1s;
}
#theme-btn:hover{background:var(--card2);}

/* ── Tooltip ─────────────────────────────────────────── */
#tip{
  display:none;position:fixed;z-index:200;width:240px;
  background:var(--card);border:1px solid var(--bd);border-radius:14px;
  padding:14px;box-shadow:var(--shadow-md);pointer-events:none;
}
#tip.show{display:block;}
#tip-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:15px;color:var(--dim);cursor:pointer;pointer-events:all;padding:2px 5px;}
.t-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;}
.t-sub{font-size:11px;color:var(--dim);margin-bottom:7px;}
.t-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.bdg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.b-cat{background:var(--card2);color:var(--dim);border:0.5px solid var(--bd);}
.b-nvda{background:rgba(59,173,141,.15);color:#1a6b50;border:0.5px solid rgba(59,173,141,.4);}
[data-theme="dark"] .b-nvda{background:rgba(59,173,141,.2);color:#7dd4b0;border-color:rgba(59,173,141,.4);}
.b-amd{background:rgba(224,112,48,.1);color:#b04000;border:0.5px solid rgba(224,112,48,.3);}
[data-theme="dark"] .b-amd{background:rgba(224,112,48,.2);color:#f0a870;border-color:rgba(224,112,48,.4);}
.t-price{font-size:22px;font-weight:700;color:var(--text);}
.t-chg{font-size:12px;font-weight:600;margin-bottom:7px;}
.t-role{font-size:10.5px;color:var(--dim);background:var(--card2);border-radius:6px;padding:5px 8px;margin-bottom:7px;line-height:1.6;display:none;}
.t-src{font-size:9px;color:var(--dim);opacity:.7;text-align:right;margin-bottom:7px;}
.t-btn{
  width:100%;padding:7px 0;background:var(--navy);border:none;border-radius:8px;
  color:#fff;font-size:11px;cursor:pointer;font-family:inherit;pointer-events:all;
  transition:.15s;
}
.t-btn:hover{background:var(--navy2);}

/* ── Mobile sheet ────────────────────────────────────── */
#sheet{
  display:none;position:fixed;left:0;right:0;bottom:0;z-index:300;
  background:var(--card);border-radius:16px 16px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.2);
  padding:0 16px 20px;max-height:65vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#sheet.open{transform:translateY(0);}
#sh-handle{width:32px;height:4px;border-radius:2px;background:var(--bd);margin:10px auto 10px;}
#sh-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:18px;color:var(--dim);cursor:pointer;}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:299;}
#overlay.show{display:block;}

/* ── Legend ─────────────────────────────────────────── */
#legend{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;flex-wrap:wrap;gap:4px 10px;padding:4px 14px 5px;
  font-size:9.5px;color:var(--dim);
  border-top:1px solid var(--bd);background:var(--card);z-index:50;
}
.li{display:flex;align-items:center;gap:3px;}
.ls{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
</style>
</head>

const priceData = {};
const PROXIES = [
  s=>`https://corsproxy.io/?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=5d`)}`,
  s=>`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=5d`)}`,
];
async function fetchPrice(sym) {
  for (const b of PROXIES) {
    try {
      const r = await fetch(b(sym),{signal:AbortSignal.timeout(8000)});
      if(!r.ok)continue;
      const j=await r.json();
      const m=j?.chart?.result?.[0]?.meta; if(!m)continue;
      const price=m.regularMarketPrice,prev=m.previousClose||m.chartPreviousClose;
      if(!price)continue;
      return{price,prev,diff:price-prev,pct:(price-prev)/prev*100,cur:m.currency||'',state:m.marketState};
    }catch{}
  }
  return null;
}
function fmtP(p,c){
  if(!p)return'—';
  const s=c==='TWD'?'NT$':c==='USD'?'$':c==='KRW'?'₩':c==='JPY'?'¥':'';
  const v=(c==='KRW'||c==='JPY')?Math.round(p).toLocaleString():p.toFixed(2);
  return s+v;
}

const prog=document.getElementById('loadprog');
const loadmsgEl=document.getElementById('loadmsg');

async function loadPrices(nodes){
  const seen=new Set();
  const queue=nodes.filter(n=>{const s=YAHOO_SYM[n.id];if(!s||seen.has(s))return false;seen.add(s);return true;});
  for(let i=0;i<queue.length;i++){
    const n=queue[i],sym=YAHOO_SYM[n.id];
    const d=await fetchPrice(sym);
    nodes.filter(x=>YAHOO_SYM[x.id]===sym).forEach(x=>priceData[x.id]=d);
    if(selected&&YAHOO_SYM[selected.id]===sym)showTip(selected);
    prog.style.width=Math.round((i+1)/queue.length*100)+'%';
    loadmsgEl.textContent=`股價 ${i+1}/${queue.length}`;
    if(i<queue.length-1)await new Promise(r=>setTimeout(r,100));
  }
  const ok=Object.values(priceData).filter(v=>v).length;
  loadmsgEl.textContent=ok>0?`✓ 已載入 ${ok} 檔`:'⚠ 無法載入';
  prog.style.background=ok>0?'#3BAD8D':'#D45C5C';
  setTimeout(()=>{document.getElementById('loadbar').style.display='none';},3000);
  render();
}

const wrap=document.getElementById('canvas-wrap');
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let tx=0,ty=0,scale=1;
const MIN_S=0.25,MAX_S=4;
let selected=null;
let activeChainKey='ai';
let activeChain=AI_CHAIN;
let activeFilter='all';
let nodeMap={};
const npos={};

function buildNodeMap(nodes){nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);}
function resetPositions(nodes){nodes.forEach(n=>npos[n.id]={x:n.x,y:n.y,r:n.r});}

function fitToView(){
  const cw=wrap.clientWidth,ch=wrap.clientHeight;
  const nodes=activeChain.nodes;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  nodes.forEach(n=>{minX=Math.min(minX,n.x-n.r);maxX=Math.max(maxX,n.x+n.r);minY=Math.min(minY,n.y-n.r);maxY=Math.max(maxY,n.y+n.r);});
  const pad=50;const pw=maxX-minX+pad*2,ph=maxY-minY+pad*2;
  scale=Math.min(cw/pw,ch/ph);
  tx=(cw-pw*scale)/2-minX*scale+pad*scale;
  ty=(ch-ph*scale)/2-minY*scale+pad*scale;
  render();
}
function toWorld(cx,cy){return{x:(cx-tx)/scale,y:(cy-ty)/scale};}

function filterSet(){
  const f=activeFilter;
  if(f==='all')return null;
  if(activeChain===AI_CHAIN){
    if(f==='nvda')return new Set(activeChain.nodes.filter(n=>n.nvda||n.id==='nvda').map(n=>n.id));
    if(f==='amd') return new Set(activeChain.nodes.filter(n=>n.amd||n.id==='amd').map(n=>n.id));
    if(f==='pkg') return new Set(activeChain.nodes.filter(n=>n.cat==='pkg').map(n=>n.id));
    if(f==='abf') return new Set(activeChain.nodes.filter(n=>n.cat==='abf').map(n=>n.id));
    if(f==='odm') return new Set(activeChain.nodes.filter(n=>n.cat==='odm').map(n=>n.id));
    if(f==='tw')  return new Set(activeChain.nodes.filter(n=>n.mkt==='TW').map(n=>n.id));
  }
  return new Set(activeChain.nodes.filter(n=>n.cat===f).map(n=>n.id));
}

function buildConnected(n){
  const s=new Set([n.id]);
  const chain=activeChain;
  const all=[
    ...(chain.nvdaEdges||[]).map(([a,b])=>({a,b})),
    ...(chain.amdEdges||[]).map(([a,b])=>({a,b})),
    ...(chain.supEdges||[]).map(([a,b])=>({a,b})),
    ...(chain.peerEdges||[]).map(([a,b])=>({a,b})),
    ...(chain.edges||[]),
  ];
  all.forEach(e=>{const ea=e.a||e[0],eb=e.b||e[1];if(ea===n.id)s.add(eb);if(eb===n.id)s.add(ea);});
  return s;
}

function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
function bgColor(){return isDark()?'#111210':'#F5F3EE';}
function edgeBaseColor(){return isDark()?'#3a3a38':'#C8C4BB';}

function render(){
  const dpr=window.devicePixelRatio||1;
  const cw=wrap.clientWidth,ch=wrap.clientHeight;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle=bgColor();
  ctx.fillRect(0,0,cv.width,cv.height);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const chain=activeChain,dark=isDark();

  // Tier bands
  chain.tiers.forEach(t=>{
    const sy1=t.y1*scale+ty,sy2=t.y2*scale+ty;
    if(sy2<0||sy1>ch)return;
    const dY1=Math.max(0,sy1),dY2=Math.min(ch,sy2);
    ctx.fillStyle=t.col;ctx.fillRect(0,dY1,cw,dY2-dY1);
    if(sy2>0&&sy2<ch){
      ctx.strokeStyle=dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
      ctx.lineWidth=0.5;ctx.setLineDash([5,9]);
      ctx.beginPath();ctx.moveTo(0,sy2);ctx.lineTo(cw,sy2);ctx.stroke();
      ctx.setLineDash([]);
    }
    const labelY=Math.max(sy1+14,14);
    if(labelY<sy2-2){
      ctx.fillStyle=dark?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.2)';
      ctx.font='500 11px "Noto Sans TC",sans-serif';
      ctx.textAlign='left';ctx.fillText(t.label,10,labelY);
    }
  });

  ctx.save();ctx.translate(tx,ty);ctx.scale(scale,scale);

  const fSet=filterSet();
  const aSet=selected?buildConnected(selected):null;
  const nodeAlpha=id=>{const vis=!fSet||fSet.has(id);if(!vis)return 0.07;if(aSet)return aSet.has(id)?1:0.12;return 1;};
  const edgeAlpha=(a,b,base)=>{const va=!fSet||fSet.has(a),vb=!fSet||fSet.has(b);if(!va||!vb)return 0;if(aSet)return(aSet.has(a)&&aSet.has(b))?base:base*0.07;return base;};
  const ec=edgeBaseColor();

  const drawLine=(ax,ay,bx,by,col,lw,dash,alpha)=>{
    if(alpha<=0)return;
    ctx.globalAlpha=alpha;ctx.strokeStyle=col;ctx.lineWidth=lw;
    ctx.setLineDash(dash||[]);ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  };

  (chain.nvdaEdges||[]).forEach(([a,b])=>{
    const na=npos[a],nb=npos[b];if(!na||!nb)return;
    const hi=aSet&&aSet.has(a)&&aSet.has(b);
    drawLine(na.x,na.y,nb.x,nb.y,'#3BAD8D',hi?2.5:1,[],edgeAlpha(a,b,hi?0.85:0.3));
  });
  (chain.amdEdges||[]).forEach(([a,b])=>{
    const na=npos[a],nb=npos[b];if(!na||!nb)return;
    const hi=aSet&&aSet.has(a)&&aSet.has(b);
    drawLine(na.x,na.y,nb.x,nb.y,'#E07030',hi?2.2:1,[6,4],edgeAlpha(a,b,hi?0.8:0.35));
  });
  (chain.supEdges||[]).forEach(([a,b])=>{
    const na=npos[a],nb=npos[b];if(!na||!nb)return;
    const hi=aSet&&aSet.has(a)&&aSet.has(b);
    const col=hi?(CATS[nodeMap[a]?.cat]?.color||ec):ec;
    drawLine(na.x,na.y,nb.x,nb.y,col,hi?2:0.7,[],edgeAlpha(a,b,1));
  });
  const dpeer=new Set();
  (chain.peerEdges||[]).forEach(([a,b])=>{
    const k=[a,b].sort().join('|');if(dpeer.has(k))return;dpeer.add(k);
    const na=npos[a],nb=npos[b];if(!na||!nb)return;
    const hi=aSet&&aSet.has(a)&&aSet.has(b);
    const col=hi?(CATS[nodeMap[a]?.cat]?.color||ec):ec;
    drawLine(na.x,na.y,nb.x,nb.y,col,hi?1.2:0.4,[3,3],edgeAlpha(a,b,1));
  });
  (chain.edges||[]).forEach(e=>{
    const na=npos[e.a],nb=npos[e.b];if(!na||!nb)return;
    const hi=aSet&&aSet.has(e.a)&&aSet.has(e.b);
    const col=hi?(CATS[nodeMap[e.a]?.cat]?.color||ec):ec;
    const alpha=edgeAlpha(e.a,e.b,1);if(alpha<=0)return;
    ctx.globalAlpha=alpha;ctx.strokeStyle=col;ctx.lineWidth=hi?2:0.8;
    ctx.setLineDash(e.dash?[5,3]:[]);
    ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(nb.x,nb.y);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  });

  chain.nodes.forEach(n=>{
    const p=npos[n.id];if(!p)return;
    const alpha=nodeAlpha(n.id);
    ctx.globalAlpha=alpha;
    const col=CATS[n.cat]?.color||'#888';
    const isSel=selected&&selected.id===n.id;
    const r=p.r;

    if(n.nvda||n.id==='nvda'){
      ctx.strokeStyle='#3BAD8D';ctx.lineWidth=n.id==='nvda'?3:1.5;
      ctx.globalAlpha=alpha*(n.id==='nvda'?0.6:0.35);
      ctx.beginPath();ctx.arc(p.x,p.y,r+(n.id==='nvda'?10:6),0,Math.PI*2);ctx.stroke();
    }
    if(n.amd||n.id==='amd'){
      ctx.strokeStyle='#E07030';ctx.lineWidth=n.id==='amd'?3:1.5;
      ctx.globalAlpha=alpha*(n.id==='amd'?0.6:0.3);
      ctx.beginPath();ctx.arc(p.x,p.y,r+(n.id==='amd'?10:n.nvda?12:6),0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=alpha;

    if(isSel){ctx.shadowColor=col;ctx.shadowBlur=20;}
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;ctx.stroke();
    ctx.shadowBlur=0;

    if(isSel){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(p.x,p.y,r+3,0,Math.PI*2);ctx.stroke();}

    const fs=r>=38?13:r>=28?11:r>=22?10:9;
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`600 ${fs}px "Noto Sans TC",system-ui`;
    ctx.fillText(n.name,p.x,p.y-(r>=22?4:3));
    ctx.font=`400 ${fs-2}px system-ui`;
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillText(n.t,p.x,p.y+(r>=22?9:8));

    ctx.fillStyle='rgba(0,0,0,0.35)';
    const bw=18,bh=11,bx=p.x-bw/2,by=p.y+r-bh-1;
    roundRect(ctx,bx,by,bw,bh,3);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='700 8px system-ui';
    const ml=n.mkt==='TW'?'台':n.mkt==='US'?'美':n.mkt==='KR'?'韓':n.mkt==='JP'?'日':n.mkt;
    ctx.fillText(ml,p.x,by+bh/2+0.5);
    ctx.globalAlpha=1;
  });
  ctx.restore();
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function hitNode(cx,cy){
  const{x,y}=toWorld(cx,cy);
  const nodes=activeChain.nodes;
  for(let i=nodes.length-1;i>=0;i--){const n=nodes[i],p=npos[n.id];if(p&&Math.hypot(x-p.x,y-p.y)<=p.r+4)return n;}
  return null;
}

// ── PAN / ZOOM ─────────────────────────────────────
let panning=false,panStartX=0,panStartY=0,panStartTx=0,panStartTy=0;
let didDrag=false,mouseCX=0,mouseCY=0;
let velX=0,velY=0,lastMoveTime=0,inertiaRaf=null;

function stopInertia(){if(inertiaRaf){cancelAnimationFrame(inertiaRaf);inertiaRaf=null;}}
function startInertia(){
  stopInertia();const friction=0.88;
  function step(){if(Math.hypot(velX,velY)<0.3){velX=0;velY=0;return;}tx+=velX;ty+=velY;velX*=friction;velY*=friction;render();inertiaRaf=requestAnimationFrame(step);}
  inertiaRaf=requestAnimationFrame(step);
}

wrap.addEventListener('mousedown',e=>{
  if(e.button!==0)return;stopInertia();velX=0;velY=0;
  mouseCX=e.clientX;mouseCY=e.clientY;didDrag=false;
  panning=true;panStartX=e.clientX;panStartY=e.clientY;panStartTx=tx;panStartTy=ty;
  wrap.classList.add('grabbing');
});
window.addEventListener('mousemove',e=>{
  mouseCX=e.clientX;mouseCY=e.clientY;
  const rect=wrap.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  if(panning){
    const dx=e.clientX-panStartX,dy=e.clientY-panStartY;
    if(Math.hypot(dx,dy)>3)didDrag=true;
    const newTx=panStartTx+dx,newTy=panStartTy+dy;
    const now=performance.now(),dt=Math.max(1,now-lastMoveTime);
    velX=(newTx-tx)*(16/dt);velY=(newTy-ty)*(16/dt);lastMoveTime=now;
    tx=newTx;ty=newTy;render();
  }
  if(!panning)wrap.style.cursor=hitNode(cx,cy)?'pointer':'grab';
});
window.addEventListener('mouseup',e=>{
  if(e.button!==0)return;
  const rect=wrap.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  if(!didDrag){
    const hit=hitNode(cx,cy);
    if(hit){selected=(selected&&selected.id===hit.id)?null:hit;render();if(selected)showTip(selected);else hideTip();}
    else{selected=null;hideTip();render();}
  }else if(panning&&Math.hypot(velX,velY)>1){startInertia();}
  panning=false;wrap.classList.remove('grabbing');wrap.style.cursor='grab';
});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();stopInertia();
  const rect=wrap.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  const delta=e.deltaY>0?0.9:1.1;
  const ns=Math.min(MAX_S,Math.max(MIN_S,scale*delta));
  tx=cx-(cx-tx)*(ns/scale);ty=cy-(cy-ty)*(ns/scale);scale=ns;render();
},{passive:false});

let lastTouches=[];
wrap.addEventListener('touchstart',e=>{
  e.preventDefault();stopInertia();velX=0;velY=0;lastTouches=[...e.touches];didDrag=false;
  if(e.touches.length===1){const t=e.touches[0];panning=true;panStartX=t.clientX;panStartY=t.clientY;panStartTx=tx;panStartTy=ty;}
},{passive:false});
wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1){const t=e.touches[0];if(panning){const dx=t.clientX-panStartX,dy=t.clientY-panStartY;if(Math.hypot(dx,dy)>5)didDrag=true;tx=panStartTx+dx;ty=panStartTy+dy;}render();}
  else if(e.touches.length===2){
    didDrag=true;const[t1,t2]=[e.touches[0],e.touches[1]];const[l1,l2]=[lastTouches[0],lastTouches[1]];if(!l1||!l2)return;
    const prevD=Math.hypot(l1.clientX-l2.clientX,l1.clientY-l2.clientY);
    const currD=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
    const midX=(t1.clientX+t2.clientX)/2-wrap.getBoundingClientRect().left;
    const midY=(t1.clientY+t2.clientY)/2-wrap.getBoundingClientRect().top;
    const ns=Math.min(MAX_S,Math.max(MIN_S,scale*currD/prevD));
    tx=midX-(midX-tx)*(ns/scale);ty=midY-(midY-ty)*(ns/scale);scale=ns;render();
  }
  lastTouches=[...e.touches];
},{passive:false});
wrap.addEventListener('touchend',e=>{
  if(!didDrag&&e.changedTouches.length===1){
    const t=e.changedTouches[0];const rect=wrap.getBoundingClientRect();
    const hit=hitNode(t.clientX-rect.left,t.clientY-rect.top);
    if(hit){selected=(selected&&selected.id===hit.id)?null:hit;render();if(selected)showTip(selected);else hideTip();}
    else{selected=null;hideTip();render();}
  }
  panning=false;
});

document.getElementById('z-in').addEventListener('click',()=>zoomCenter(1.25));
document.getElementById('z-out').addEventListener('click',()=>zoomCenter(0.8));
document.getElementById('z-rst').addEventListener('click',()=>fitToView());
function zoomCenter(d){const cw=wrap.clientWidth,ch=wrap.clientHeight;const ns=Math.min(MAX_S,Math.max(MIN_S,scale*d));tx=cw/2-(cw/2-tx)*(ns/scale);ty=ch/2-(ch/2-ty)*(ns/scale);scale=ns;render();}

// ── TOOLTIP ───────────────────────────────────────
const isMobile=()=>window.innerWidth<700;
function positionTip(){
  const el=document.getElementById('tip');const W=el.offsetWidth||240,H=el.offsetHeight||280;
  const vw=window.innerWidth,vh=window.innerHeight,off=18;
  let x=mouseCX+off,y=mouseCY+off;
  if(x+W>vw-8)x=mouseCX-W-off;if(y+H>vh-8)y=mouseCY-H-off;
  x=Math.max(8,x);y=Math.max(8,y);el.style.left=x+'px';el.style.top=y+'px';
}

function showTip(n){
  const d=priceData[n.id];
  const mktL=n.mkt==='TW'?'台股':n.mkt==='US'?'美股':n.mkt==='KR'?'韓股':'日股';
  const nvdaBdg=n.nvda?'<span class="bdg b-nvda">NVDA供應鏈</span>':'';
  const amdBdg=n.amd?'<span class="bdg b-amd">AMD $100億</span>':'';
  const catBdg=`<span class="bdg b-cat">${CATS[n.cat]?.label||n.cat}</span>`;
  const priceStr=d?fmtP(d.price,d.cur):'—';
  const chgStr=d?(()=>{const s=d.diff>=0?'+':'';return`${s}${d.diff.toFixed(2)} (${s}${d.pct.toFixed(2)}%)`})():'';
  const chgCol=d?(d.diff>=0?'#22863a':'#cb2431'):'var(--dim)';
  const stateL=d?(d.state==='REGULAR'?'盤中即時':d.state==='CLOSED'||d.state==='POST'?'前日收盤':''):'';
  const role=(activeChain.roles||{})[n.id]||n.desc||'';
  const goStock=()=>{
    if(window.parent!==window){
      window.parent.postMessage({type:'gotoStock',ticker:n.t},'*');
    }else{
      window.location.href=`/?autoq=${encodeURIComponent(n.t)}`;
    }
  };;
  if(isMobile()){
    document.getElementById('s-name').textContent=n.name;
    document.getElementById('s-sub').textContent=`${n.t} · ${mktL}`;
    document.getElementById('s-badges').innerHTML=`${catBdg}${nvdaBdg}${amdBdg}`;
    document.getElementById('s-price').textContent=priceStr;
    const sc=document.getElementById('s-chg');sc.textContent=chgStr;sc.style.color=chgCol;
    const sr=document.getElementById('s-role');if(role){sr.textContent=role;sr.style.display='block';}else sr.style.display='none';
    document.getElementById('s-src').textContent=stateL?`Yahoo Finance・${stateL}`:'';
    document.getElementById('s-btn').onclick=goStock;
    document.getElementById('sheet').classList.add('open');document.getElementById('overlay').classList.add('show');
  }else{
    document.getElementById('t-name').textContent=n.name;
    document.getElementById('t-sub').textContent=`${n.t} · ${mktL}`;
    document.getElementById('t-badges').innerHTML=`${catBdg}${nvdaBdg}${amdBdg}`;
    document.getElementById('t-price').textContent=priceStr;
    const tc=document.getElementById('t-chg');tc.textContent=chgStr;tc.style.color=chgCol;
    const tr=document.getElementById('t-role');if(role){tr.textContent=role;tr.style.display='block';}else tr.style.display='none';
    document.getElementById('t-src').textContent=stateL?`Yahoo Finance・${stateL}`:'';
    document.getElementById('t-btn').onclick=goStock;
    const tip=document.getElementById('tip');tip.classList.add('show');
    requestAnimationFrame(()=>requestAnimationFrame(positionTip));
  }
}
function hideTip(){
  document.getElementById('tip').classList.remove('show');
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
document.getElementById('tip-close').addEventListener('click',e=>{e.stopPropagation();selected=null;hideTip();render();});
document.getElementById('overlay').addEventListener('click',()=>{selected=null;hideTip();render();});
document.getElementById('sh-close').addEventListener('click',()=>{selected=null;hideTip();render();});

// ── FILTERS ───────────────────────────────────────
function renderFilters(chain){
  const bar=document.getElementById('filters');bar.innerHTML='';
  if(!chain.filters||chain.filters.length===0){bar.classList.add('hidden');return;}
  bar.classList.remove('hidden');
  chain.filters.forEach(f=>{
    const btn=document.createElement('button');
    btn.className='ftab'+(f.cls?' '+f.cls:'')+(f.id==='all'?' active':'');
    btn.textContent=f.label;btn.dataset.f=f.id;
    btn.addEventListener('click',()=>{
      bar.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');activeFilter=f.id;selected=null;hideTip();render();
    });
    bar.appendChild(btn);
  });
}

// ── LEGEND ────────────────────────────────────────
function renderLegend(chain){
  const leg=document.getElementById('legend');let html='';
  (chain.legendCats||[]).forEach(k=>{const cat=CATS[k];if(!cat)return;html+=`<div class="li"><span class="ls" style="background:${cat.color}"></span>${cat.label}</div>`;});
  if(chain===AI_CHAIN){
    html+=`<div class="li" style="gap:4px"><svg width="16" height="6"><line x1="0" y1="3" x2="16" y2="3" stroke="#3BAD8D" stroke-width="1.5"/></svg>NVDA線</div>`;
    html+=`<div class="li" style="gap:4px"><svg width="16" height="6"><line x1="0" y1="3" x2="16" y2="3" stroke="#E07030" stroke-width="1.5" stroke-dasharray="4 2"/></svg>AMD線</div>`;
  }
  leg.innerHTML=html;
}

// ── TAB SWITCHING ─────────────────────────────────
function switchTab(key,el){
  document.querySelectorAll('.chain-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  activeChainKey=key;activeChain=CHAIN_MAP[key];activeFilter='all';
  selected=null;hideTip();
  buildNodeMap(activeChain.nodes);resetPositions(activeChain.nodes);
  renderFilters(activeChain);renderLegend(activeChain);fitToView();
  document.getElementById('loadbar').style.display='block';
  prog.style.width='0%';prog.style.background='var(--accent)';
  loadmsgEl.textContent='載入股價中…';
  loadPrices(activeChain.nodes);
}

// ── THEME ─────────────────────────────────────────
function applyTheme(dark){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=dark?'☀️':'🌙';
  localStorage.setItem('theme',dark?'dark':'light');
  render();
}
document.getElementById('theme-btn').addEventListener('click',()=>applyTheme(!isDark()));
(function(){
  const saved=localStorage.getItem('theme');
  const sysDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  applyTheme(saved?saved==='dark':sysDark);
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',e=>{if(!localStorage.getItem('theme'))applyTheme(e.matches);});
})();

// ── RESIZE + INIT ──────────────────────────────────
function resize(){
  const dpr=window.devicePixelRatio||1,cw=wrap.clientWidth,ch=wrap.clientHeight;
  cv.width=cw*dpr;cv.height=ch*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);fitToView();
}
window.addEventListener('resize',()=>resize());

buildNodeMap(activeChain.nodes);
resetPositions(activeChain.nodes);
renderFilters(activeChain);
renderLegend(activeChain);
requestAnimationFrame(()=>requestAnimationFrame(()=>{
  resize();loadPrices(activeChain.nodes);
}));
</script>
