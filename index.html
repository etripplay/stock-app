<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票分析互動看板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #D45F25;
  --accent2: #B34E1A;
  --navy: #1A3A58;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Noto Sans TC', -apple-system, sans-serif;
  background: #0D1F35;
  overflow: hidden;
}

/* ── Header ── */
.hdr {
  flex-shrink: 0;
  background: linear-gradient(135deg, #0D1F35 0%, #1A3A58 55%, #0F2A40 100%);
  color: #fff;
  padding: 10px 18px 0;
  border-bottom: 2px solid var(--accent);
  box-shadow: 0 4px 24px rgba(0,0,0,.25);
  display: flex;
  flex-direction: column;
}

.hdr-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.hdr-title {
  font-size: 17px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.hdr-title span {
  display: inline-block;
  width: 4px;
  height: 20px;
  background: var(--accent);
  border-radius: 2px;
}
.hdr-time {
  font-size: 13px;
  color: #8eabc8;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

/* ── Tab bar ── */
.tabs {
  display: flex;
  gap: 0;
  margin-top: 2px;
}
.tab {
  padding: 9px 20px;
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  color: #8eabc8;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.tab:hover { color: #fff; }
.tab.on {
  color: #fff;
  border-bottom-color: var(--accent);
  font-weight: 700;
}

/* ── Content ── */
.content {
  flex: 1;
  position: relative;
  overflow: hidden;
}

html, body { display: flex; flex-direction: column; }
body { flex: 1; }
.hdr { flex-shrink: 0; }
.content { flex: 1; overflow: hidden; }

iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: #F5F3EE;
}
iframe.active { display: block; }

/* supply chain iframe has overflow:hidden body — needs special treatment */
#frame-supply { background: #F5F3EE; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">
      <span></span>股票分析互動看板
    </div>
    <div class="hdr-time" id="clk">--:--</div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-query"    onclick="switchTab('query')">📊 股票查詢</button>
    <button class="tab"    id="tab-supply"   onclick="switchTab('supply')">🗺 供應鏈地圖</button>
    <button class="tab"    id="tab-ai"       onclick="switchTab('ai')">🤖 AI供應鏈分析</button>
  </div>
</div>

<div class="content">
  <iframe id="frame-query"  src="stock-query.html"  class="active"></iframe>
  <iframe id="frame-supply" src="supply-chain.html"></iframe>
  <iframe id="frame-ai"     src="ai-analysis.html"></iframe>
</div>

<script>
const TABS = ['query', 'supply', 'ai'];

function switchTab(key, pushState = true) {
  TABS.forEach(k => {
    document.getElementById('tab-' + k).classList.toggle('on', k === key);
    document.getElementById('frame-' + k).classList.toggle('active', k === key);
  });
  if (pushState) history.pushState({ tab: key }, '', '#' + key);
}

// 讀 hash 決定初始 tab
function tabFromHash() {
  const h = location.hash.replace('#', '');
  return TABS.includes(h) ? h : 'query';
}

// 瀏覽器上一頁 / 下一頁
window.addEventListener('popstate', e => {
  switchTab(e.state?.tab || tabFromHash(), false);
});

// Handle "查詢這支股票" from supply-chain iframe
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'gotoStock' && e.data.ticker) {
    switchTab('query');
    setTimeout(() => {
      document.getElementById('frame-query').contentWindow
        .postMessage({ type: 'autoSearch', ticker: e.data.ticker }, '*');
    }, 100);
  }
});

// Clock
function tick() {
  document.getElementById('clk').textContent =
    new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
}
tick();
setInterval(tick, 1000);

// 初始化：依 hash 顯示正確 tab，並建立初始 history entry
const initTab = tabFromHash();
switchTab(initTab, false);
history.replaceState({ tab: initTab }, '', '#' + initTab);
</script>
</body>
</html>
