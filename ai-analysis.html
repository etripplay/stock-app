  <div class="grade-row" style="background:${d.grade_bg}">
    <div class="grade" style="color:${d.grade_c};border-color:${d.color}">${d.grade}</div>
    <div class="gtext" style="color:${d.grade_c}">${d.verdict.slice(0,44)}…</div>
  </div>
</div>
<div class="card">
  <div class="sec-lbl sl-g" style="margin-bottom:8px">進場 / 停損參考</div>
  <div class="pz-grid">
    <div class="pzone" style="background:#EAF3DE"><div class="pzone-t" style="color:#3B6D11">理想進場</div><div class="pzone-v" style="color:#3B6D11">${d.entry}</div></div>
    <div class="pzone" style="background:#dceefb"><div class="pzone-t" style="color:#0C447C">現價</div><div class="pzone-v" style="color:#0C447C">${d.cur}</div></div>
    <div class="pzone" style="background:#FCEBEB"><div class="pzone-t" style="color:#A32D2D">停損</div><div class="pzone-v" style="color:#A32D2D">${d.stop}</div></div>
  </div>
</div>
<div class="card">
  <div class="sec-lbl sl-p" style="margin-bottom:8px">適合投資人</div>
  <div class="suit-box">${d.suit}</div>
</div>`
}

function secContent(s,tab){
  const d=STOCKS[s];
  const pts=(arr)=>arr.map(p=>`<div class="pt"><span class="pi">${p.i}</span><div class="ptx"><b>${p.t}</b><br>${p.d}<br>${renderTags(p.tags||[])}</div></div>`).join('');
  const sections={
    "長線分析":()=>`<div class="card"><div class="sec-lbl sl-b">長線分析</div>${pts(d.long)}</div>`,
    "短線分析":()=>`<div class="card"><div class="sec-lbl sl-r">短線分析</div>${pts(d.short)}</div>`,
    "財務數據":()=>`<div class="card"><div class="sec-lbl sl-g">財務數據</div>${d.fin.map(b=>`<div class="bar-row"><span class="bar-lbl">${b.l}</span><div class="bar-out"><div class="bar-in" style="width:${b.w}%;background:${b.c}"><span class="bar-val">${b.v}</span></div></div></div>`).join('')}</div>`,
    "產品結構":()=>`<div class="card"><div class="sec-lbl sl-a">產品結構</div><div class="prod-bar">${d.prod.segs.map(sg=>`<div class="prod-seg" style="width:${sg.w}%;background:${sg.c}">${sg.w>12?sg.w+'%':''}</div>`).join('')}</div><div class="prod-leg">${d.prod.segs.map(sg=>`<span class="leg"><span class="leg-dot" style="background:${sg.c}"></span>${sg.l} ${sg.w}%</span>`).join('')}</div></div>`,
    "估值分析":()=>`<div class="card"><div class="sec-lbl sl-p">估值分析</div>${pts(d.val)}</div>`,
    "主要風險":()=>`<div class="card"><div class="sec-lbl sl-e">主要風險</div>${pts(d.risk)}</div>`,
    "投資結論":()=>`<div class="card"><div class="sec-lbl sl-e">投資結論</div><div class="pt" style="background:#E1F5EE"><span class="pi">🎯</span><div class="ptx" style="color:#085041"><b>${d.verdict}</b></div></div><div style="height:8px"></div><div class="sec-lbl sl-p" style="margin-bottom:6px">適合投資人</div><div class="suit-box">${d.suit}</div></div>`
  };
  return sections[tab]?sections[tab]():sections["長線分析"]();
}

function rightPanel(s,tab){
  if(tab==="總覽"){
    return`<div class="right-col">
      ${secContent(s,"長線分析")}
      ${secContent(s,"短線分析")}
      <div class="two-col">${secContent(s,"財務數據")}${secContent(s,"估值分析")}</div>
      ${secContent(s,"產品結構")}
      ${secContent(s,"主要風險")}
      ${secContent(s,"投資結論")}
    </div>`
  }
  return`<div class="right-col">${secContent(s,tab)}</div>`
}

function render(){
  document.getElementById('selRow').innerHTML=Object.keys(STOCKS).map(k=>`<div class="chip${k===curStock?' on':''}" onclick="sel('${k}')">${STOCKS[k].name} ${k}</div>`).join('');
  document.getElementById('tabRow').innerHTML=TABS.map(t=>`<div class="tab${t===curTab?' on':''}" onclick="selTab('${t}')">${t}</div>`).join('');
  document.getElementById('mainGrid').innerHTML=`<div>${leftPanel(curStock)}</div><div>${rightPanel(curStock,curTab)}</div>`
}

window.sel=k=>{curStock=k;render()}
window.selTab=t=>{curTab=t;render()}
render();

// 今日日期
(function(){
  const d=new Date();
  const s=d.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('today-date').textContent=s;
})();
</script>
</body>
</html>
